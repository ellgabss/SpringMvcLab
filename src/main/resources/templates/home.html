<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main>
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-maroon">

        <div class="p-8 border-b border-gray-100">
            <h1 class="text-5xl font-extrabold text-gray-800 mb-2">Spring MVC Lab</h1>
            <p class="text-xl text-gray-500 font-light">Latihan Week 4 - MVC Pattern & Controller Layer</p>
        </div>

        <div class="p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                <span class="w-8 h-8 rounded-full bg-sky inline-block mr-3"></span>
                Jelajahi Produk:
            </h2>

            <div class="flex flex-wrap gap-4">

                <a th:href="@{/products}" class="bg-sky hover:bg-sky-dark text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all duration-300 ease-in-out transform hover:-translate-y-1">
                    Semua Produk
                </a>

                <a th:href="@{/products/category/Elektronik}" class="bg-white text-maroon hover:bg-maroon hover:text-white border-2 border-maroon font-semibold py-3 px-8 rounded-lg shadow-sm transition-all duration-300 ease-in-out">
                    Elektronik
                </a>

                <a th:href="@{/products/category/Buku}" class="bg-white text-maroon hover:bg-maroon hover:text-white border-2 border-maroon font-semibold py-3 px-8 rounded-lg shadow-sm transition-all duration-300 ease-in-out">
                    Buku
                </a>

                <a th:href="@{/products/category/Makanan}" class="bg-white text-maroon hover:bg-maroon hover:text-white border-2 border-maroon font-semibold py-3 px-8 rounded-lg shadow-sm transition-all duration-300 ease-in-out">
                    Makanan
                </a>
            </div>
        </div>

    </div>
</main>
</body>
</html>
