<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main class="flex items-center justify-center flex-col">

    <div class="w-full max-w-2xl mb-4 px-2">
        <nav class="text-sm text-gray-500">
            <a th:href="@{/}" class="hover:underline">Home</a>
            <span class="mx-2">/</span>
            <a th:href="@{/products}" class="hover:underline">Produk</a>
            <span class="mx-2">/</span>
            <span class="font-semibold text-gray-700"
                  th:text="${product != null ? product.name : 'Detail'}">
                Detail
            </span>
        </nav>
    </div>

    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-maroon relative">

        <div class="absolute top-0 right-0 -mt-8 -mr-8 w-32 h-32 bg-sky opacity-20 rounded-full blur-xl"></div>

        <div th:if="${product != null}" class="bg-gray-50 px-8 py-6 border-b border-gray-100 flex justify-between items-center relative z-10">
            <h1 class="text-3xl font-extrabold text-maroon" th:text="${title}">Detail Produk</h1>
            <a th:href="@{/products/category/{cat}(cat=${product.category})}" class="bg-sky-light hover:bg-sky text-maroon-dark py-1.5 px-4 rounded-full text-sm font-bold border border-sky shadow-sm transition duration-300" th:text="${product.category}">
                Kategori
            </a>
        </div>

        <div th:if="${error != null}" class="p-8 text-center relative z-10">
            <h2 class="text-2xl font-bold text-red-600 mb-4" th:text="${title}">Error</h2>
            <p class="text-gray-700" th:text="${error}">Pesan error di sini</p>
            <div class="mt-6">
                <a th:href="@{/products}" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2.5 px-6 rounded-lg transition duration-300 shadow-sm">
                    &larr; Kembali ke Daftar
                </a>
            </div>
        </div>

        <div th:if="${product != null}" class="p-8 relative z-10">
            <div class="mb-8 text-center md:text-left">
                <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider mb-1">
                    ID: <span th:text="${product.id}">1</span>
                </p>
                <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider mb-1 mt-2">Nama Produk</p>
                <p class="text-3xl font-bold text-gray-800" th:text="${product.name}">Laptop ASUS</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center items-center md:items-start">
                    <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider mb-1">Harga Jual</p>
                    <p class="text-2xl font-bold text-sky-dark" th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 1, 'COMMA', 0, 'POINT')}">Rp 12,500,000</p>
                </div>

                <div class="bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm flex flex-col justify-center items-center md:items-start">
                    <p class="text-sm text-gray-500 font-semibold uppercase tracking-wider mb-1">Stok Tersedia</p>
                    <p class="text-2xl font-bold"
                       th:classappend="${product.stock <= 20} ? 'text-red-600' : 'text-gray-800'"
                       th:text="${product.stock} + ' Unit'">
                        15 Unit
                    </p>
                    <p th:if="${product.stock <= 20}" class="text-sm text-red-500 font-bold mt-1 bg-red-100 px-2 py-1 rounded">
                        Stok Menipis!
                    </p>
                    <p th:if="${product.stock > 20}" class="text-sm text-green-600 font-bold mt-1 bg-green-100 px-2 py-1 rounded">
                        Stok Aman
                    </p>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 mt-8 border-t border-gray-100 pt-6 justify-center md:justify-start">
                <a th:href="@{/products}" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2.5 px-6 rounded-lg transition duration-300 shadow-sm">
                    &larr; Kembali ke Daftar
                </a>
            </div>
        </div>

    </div>
</main>
</body>
</html>
