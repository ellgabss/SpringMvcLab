<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Kategori</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h1 th:text="${title}">Judul</h1>
  <div class="list-group mt-3">
    <a th:each="cat : ${categories}"
       th:href="@{/products/category/{name}(name=${cat})}"
       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
      <span th:text="${cat}">Nama Kategori</span>
      <span class="badge bg-success rounded-pill"
            th:text="${service.countProductsByCategory(cat)}">0</span>
    </a>
  </div>
  <a th:href="@{/products}" class="btn btn-secondary mt-3">Kembali ke Daftar Produk</a>
</div>
</body>
</html>
