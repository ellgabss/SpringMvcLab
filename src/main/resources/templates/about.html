<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>About Me</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Spring MVC Lab</a>
    </div>
</nav>

<div class="container">
    <h1 th:text="${appName} + ' v' + ${version}">Nama Aplikasi</h1>
    <p class="lead">Dibuat oleh: <strong th:text="${author}">Nama Kamu</strong></p>

    <h3 class="mt-4">Teknologi yang Digunakan:</h3>
    <ul class="list-group" style="max-width: 400px;">
        <li class="list-group-item" th:each="tech : ${technologies}" th:text="${tech}">Teknologi</li>
    </ul>

    <a th:href="@{/}" class="btn btn-primary mt-4">Kembali ke Home</a>
</div>
</body>
</html>
